models:

  molmo2-4b:
    enabled: false
    backend: local_transformers
    model_id: allenai/Molmo2-4B
    dtype: bfloat16
    max_new_tokens: 512
    temperature: 0.0
    device: cuda
    transformers:
      trust_remote_code: true

  qwen2-5-vl-7b:
    enabled: true
    backend: local_transformers
    model_id: Qwen/Qwen2.5-VL-7B-Instruct
    dtype: bfloat16
    max_new_tokens: 512
    temperature: 0.0
    device: cuda
    transformers:
      attn_implementation: flash_attention_2   # désactiver si pas installé

  mistral-medium:
    enabled: true
    backend: mistral_api
    model_id: mistral-medium-latest
    max_new_tokens: 512
    temperature: 0.0
    mistral_api:
      base_url: "${MISTRAL_API_BASE}"          # depuis .env
      api_key: "${MISTRAL_API_KEY}"
      timeout_s: 60

  llava-1-6:
    enabled: true
    backend: local_transformers
    model_id: llava-hf/llava-v1.6-mistral-7b-hf
    dtype: float16
    max_new_tokens: 512
    temperature: 0.0
    device: cuda
    transformers:
      attn_implementation: eager

  gpt-4v:
    enabled: false
    backend: openai_api
    model_id: gpt-4-vision-preview
    max_new_tokens: 512
    temperature: 0.0
    openai_api:
      base_url: "${OPENAI_API_BASE}"   # endpoint ALTEN spécifique
      api_key: "${OPENAI_API_BASE}"
      timeout_s: 60
