models:

  # ── API models ───────────────────────────────────────────────────────────────

  openrouter-test:
    enabled: false
    backend: openai_api
    model_id: allenai/molmo-2-8b
    max_new_tokens: 1024
    temperature: 0.0
    parallel_workers: 4
    openai_api:
      base_url: "https://openrouter.ai/api/v1"
      api_key: "${OPENROUTER_API_KEY}"
      timeout_s: 60

  mistral-medium:
    enabled: true
    backend: mistral_api
    model_id: mistral-medium-latest
    max_new_tokens: 12000
    temperature: 0.0
    parallel_workers: 4
    mistral_api:
      base_url: "${MISTRAL_API_BASE}"
      api_key: "${MISTRAL_API_KEY}"
      timeout_s: 60

  mistral-large:
    enabled: true
    backend: openai_api
    model_id: ADADAS-mistral-large-3
    max_new_tokens: 12000
    temperature: 0.0
    parallel_workers: 4
    max_images: 8
    openai_api:
      base_url: "${OPENAI_API_BASE}"
      api_key: "${OPENAI_API_KEY}"
      timeout_s: 60

  gpt-4o-mini:
    enabled: true
    backend: openai_api
    model_id: gpt-4o-mini
    max_new_tokens: 12000
    temperature: 0.0
    parallel_workers: 4
    max_images: 8
    openai_api:
      base_url: "${OPENAI_API_BASE}"
      api_key: "${OPENAI_API_KEY}"
      timeout_s: 60

  gpt-5-mini:
    enabled: true
    backend: openai_api
    model_id: ADADAS-gpt-5-mini
    max_new_tokens: 12000
    temperature: 0.0
    parallel_workers: 4
    max_images: 8
    openai_api:
      base_url: "${OPENAI_API_BASE}"
      api_key: "${OPENAI_API_KEY}"
      timeout_s: 180

  # ── Local models (Transformers) ───────────────────────────────────────────────

  molmo2-8b:
    enabled: false
    backend: local_transformers
    model_id: allenai/Molmo2-8B
    load_in_8bit: true          # 8-bit (~8 Go) — 4-bit (~4.5 Go) mais cause des dégénérescences de génération
    max_new_tokens: 1024        # 12000 explose le KV cache sur 16 Go ; les sorties réelles sont < 1000 tokens
    temperature: 0.0
    device: cuda
    transformers:
      trust_remote_code: true

  molmo2-8b-pointing:
    enabled: false
    backend: molmo_pointing
    model_id: allenai/Molmo2-8B
    load_in_8bit: true
    max_new_tokens: 512
    temperature: 0.0
    device: cuda
    transformers:
      trust_remote_code: true

