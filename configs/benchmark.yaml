benchmark:
  run_id: null    # null = timestamp auto-generated (YYYYMMDD_HHMMSS)

  prompt:
    version: v2   # prompts/extraction_v2.txt

  scorers:
    titan_gt: true
    llm_judge:
      enabled: true
      backend: openai_api
      model_id: "ADADAS-gpt-5-mini"
      base_url: "${OPENAI_API_BASE}"
      api_key: "${OPENAI_API_KEY}"
      temperature: 0.0
      max_tokens: 2500

  output:
    runs_dir: runs
    save_raw_outputs: false   # raw VLM text — large, skip unless debugging
    save_parsed_outputs: true # parsed JSON + judge outputs (required for analysis)

  post_run:
    full: true    # auto-run analysis + plots after benchmark
