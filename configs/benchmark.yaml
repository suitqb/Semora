benchmark:
  run_id: null          # null = automatically generated (timestamp)
  seed: 42

  prompt:
    version: v2           # selects prompts/extraction_v2.txt (multi-frame)
    # version: v1         # legacy single-frame prompt

  scorers:
    titan_gt: true      # precision / recall / F1 vs TITAN CSV annotations
    llm_judge:
      enabled: true
      backend: "mistral_api"         # "openai_api" or "mistral_api"
      model_id: "mistral-medium-latest" # Model used for judging
      temperature: 0.0
      max_tokens: 1024

  output:
    results_dir: results/runs
    save_raw_outputs: true    # log raw text before parsing
    save_parsed_outputs: true # log parsed dictionary
