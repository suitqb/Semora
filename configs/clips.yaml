dataset: TITAN
data_root: data/titan

# Plans 1 & 2 — Extraction quality & temporal consistency
#
# window_sizes: [1, 4]
#   N=1 → Plan 1 : extraction pure frame par frame (pas de contexte temporel)
#   N=4 → Plan 2 : cohérence temporelle, testabilité de la traçabilité
#
# step: 15
#   1 frame toutes les 1.5s à 10fps TITAN (~20-40 windows/clip selon la longueur)
#   Assure l'indépendance entre fenêtres consécutives pour le Plan 2
#   Donne assez de samples par clip pour le Plan 1
#
# frame_selection: last
#   Les N frames les plus récentes jusqu'à la frame cible
#   Plus cohérent temporellement que "uniform" pour le Plan 2

clips:

  - clip_id: clip_1
    video_path: clips/clip_1/images
    annotation_path: annotations/clip_1.csv

  - clip_id: clip_75
    video_path: clips/clip_75/images
    annotation_path: annotations/clip_75.csv

  - clip_id: clip_279
    video_path: clips/clip_279/images
    annotation_path: annotations/clip_279.csv

  - clip_id: clip_280
    video_path: clips/clip_280/images
    annotation_path: annotations/clip_280.csv

  - clip_id: clip_544
    video_path: clips/clip_544/images
    annotation_path: annotations/clip_544.csv

  - clip_id: clip_552
    video_path: clips/clip_552/images
    annotation_path: annotations/clip_552.csv

  - clip_id: clip_621
    video_path: clips/clip_621/images
    annotation_path: annotations/clip_621.csv

  - clip_id: clip_761
    video_path: clips/clip_761/images
    annotation_path: annotations/clip_761.csv

  - clip_id: clip_785
    video_path: clips/clip_785/images
    annotation_path: annotations/clip_785.csv

sampling:
  window_sizes: [1, 4]
  frame_selection: last
  max_resolution: [1280, 720]
  step: 15
